<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <h1>Task Manager</h1>

    <div id="auth-view" class="card">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <div class="error" id="auth-error"></div>
      <div style="display:flex;gap:.5rem">
        <button class="btn-primary" id="login-btn">Log In</button>
        <button class="btn-secondary" id="register-btn">Register</button>
      </div>
    </div>

    <div id="tasks-view" class="card hidden">
      <div id="add-row">
        <input type="text" id="new-task" placeholder="New task…">
        <button class="btn-primary" id="add-btn">Add</button>
      </div>
      <div id="task-list"></div>
      <button class="btn-secondary" id="logout-btn" style="margin-top:1rem">Log Out</button>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
